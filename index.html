<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aethon Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0b0b0f;
      color: #ffffff;
    }

    /* Header */
    header {
      height: 60px;
      background: #111116;
      border-bottom: 1px solid #1f1f2e;
    }

    /* Banner */
    .banner {
      position: relative;
      height: 320px;
      background: url('banner.jpg') center/cover no-repeat;
    }

    /* Profile */
    .profile {
      position: absolute;
      bottom: -50px;
      left: 40px;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 5px solid #0b0b0f;
      background: url('profile.jpg') center/cover no-repeat;
    }

    /* Info Section */
    .info {
      padding: 70px 40px 30px;
    }

    .name {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #c084fc;
    }

    .status {
      display: inline-block;
      background: #a855f7;
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 22px;
      font-weight: 500;
    }

    .location {
      color: #9ca3af;
      margin-top: 6px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header></header>

  <section class="banner">
    <div class="profile"></div>
  </section>

  <section class="info">
    <div class="name">Aethon</div>
    <div class="status">Available for Freelance & Fulltime</div>
    <div class="title">Graphic Designer</div>
    <div class="location">Egypt</div>
  </section>

</body>
</html>

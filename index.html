<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deadronz Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: #020617;
    }

    .logo {
      font-size: 22px;
      font-weight: 600;
      color: #38bdf8;
    }

    /* Banner Section */
    .banner {
      position: relative;
      height: 350px;
      background: url('banner.jpg') center/cover no-repeat;
    }

    /* Profile Image */
    .profile {
      position: absolute;
      bottom: -60px;
      left: 40px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #0f172a;
      background: url('profile.jpg') center/cover no-repeat;
    }

    /* Info Section */
    .info {
      padding: 80px 40px 40px;
    }

    .status {
      display: inline-block;
      background: #22c55e;
      color: black;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 24px;
      font-weight: 600;
    }

    .location {
      opacity: 0.7;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">Deadronz</div>
  </header>

  <section class="banner">
    <div class="profile"></div>
  </section>

  <section class="info">
    <div class="status">Available for Freelance & Fulltime</div>
    <div class="title">Graphic Designer</div>
    <div class="location">Egypt</div>
  </section>

</body>
</html>

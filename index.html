<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aethon Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f5f7fa;
      color: #111;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      padding: 20px 40px;
      background: white;
      border-bottom: 1px solid #e5e7eb;
    }

    .logo {
      font-size: 22px;
      font-weight: 600;
      color: #2563eb;
      letter-spacing: 1px;
    }

    /* Banner */
    .banner {
      position: relative;
      height: 320px;
      background: url('banner.jpg') center/cover no-repeat;
    }

    /* Profile */
    .profile {
      position: absolute;
      bottom: -50px;
      left: 40px;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 5px solid white;
      background: url('profile.jpg') center/cover no-repeat;
    }

    /* Info Section */
    .info {
      padding: 70px 40px 30px;
    }

    .status {
      display: inline-block;
      background: #2563eb;
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 26px;
      font-weight: 600;
    }

    .location {
      color: #6b7280;
      margin-top: 6px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">aethon</div>
  </header>

  <section class="banner">
    <div class="profile"></div>
  </section>

  <section class="info">
    <div class="status">Available for Freelance & Fulltime</div>
    <div class="title">Graphic Designer</div>
    <div class="location">Egypt</div>
  </section>

</body>
</html>

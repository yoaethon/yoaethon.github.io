<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aethon Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0b0b0f;
      color: #ffffff;
    }

    header {
      height: 60px;
      background: #111116;
      border-bottom: 1px solid #1f1f2e;
    }

    /* Banner */
    .banner {
      position: relative;
      height: 320px;
      background: url('banner.jpg') center/cover no-repeat;
    }

    /* Profile */
    .profile {
      position: absolute;
      bottom: -50px;
      left: 40px;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 5px solid #0b0b0f;
      background: url('profile.jpg') center/cover no-repeat;
    }

    /* Info */
    .info {
      padding: 70px 40px 20px;
    }

    .name {
      font-size: 24px;
      font-weight: 600;
      color: #c084fc;
      margin-bottom: 10px;
    }

    .status {
      display: inline-block;
      background: #a855f7;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 22px;
      font-weight: 500;
    }

    .location {
      color: #9ca3af;
      margin-top: 6px;
      font-size: 14px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 20px;
      padding: 0 40px;
      margin-top: 20px;
      border-bottom: 1px solid #1f1f2e;
    }

    .tab-btn {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 14px;
      padding: 10px 0;
      cursor: pointer;
      position: relative;
    }

    .tab-btn.active {
      color: #c084fc;
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: #a855f7;
    }

    /* Tab Content */
    .tab-content {
      display: none;
      padding: 20px 40px;
      color: #d1d5db;
    }

    .tab-content.active {
      display: block;
    }
  </style>
</head>

<body>

  <header></header>

  <section class="banner">
    <div class="profile"></div>
  </section>

  <section class="info">
    <div class="name">Aethon</div>
    <div class="status">Available for Freelance & Fulltime</div>
    <div class="title">Graphic Designer</div>
    <div class="location">Egypt</div>
  </section>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="openTab(event, 'info')">Info</button>
    <button class="tab-btn" onclick="openTab(event, 'work')">Work</button>
    <button class="tab-btn" onclick="openTab(event, 'services')">Services</button>
    <button class="tab-btn" onclick="openTab(event, 'appreciations')">Appreciations</button>
  </div>

  <!-- Content -->
  <div class="tab-content active" id="info">
    <p>I’m a creative graphic designer passionate about branding and visual identity.</p>
  </div>

  <div class="tab-content" id="work">
    <p>Projects will appear here.</p>
  </div>

  <div class="tab-content" id="services">
    <p>Logo Design, Branding, Social Media Designs.</p>
  </div>

  <div class="tab-content" id="appreciations">
    <p>Likes and feedback from clients.</p>
  </div>

  <script>
    function openTab(event, tabId) {
      const contents = document.querySelectorAll('.tab-content');
      const buttons = document.querySelectorAll('.tab-btn');

      contents.forEach(c => c.classList.remove('active'));
      buttons.forEach(b => b.classList.remove('active'));

      document.getElementById(tabId).classList.add('active');
      event.currentTarget.classList.add('active');
    }
  </script>

</body>
</html>

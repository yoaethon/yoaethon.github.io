<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aethon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: radial-gradient(circle at center, #0a0f2c, #050816);
  color: white;
  overflow-x: hidden;
}

/* 🔥 Glow Shapes */
body::before,
body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  filter: blur(120px);
  z-index: 0;
}

body::before {
  left: -100px;
  top: 30%;
  background: #4facfe;
}

body::after {
  right: -100px;
  top: 20%;
  background: #8e2de2;
}

/* 🔝 Header */
header {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: space-between;
  padding: 20px 8%;
  backdrop-filter: blur(10px);
}

.logo {
  font-size: 22px;
  font-weight: 600;
  color: #4facfe;
  animation: slideIn 1s ease;
}

/* ✨ Animation */
@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(-30px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/* 🎯 Hero */
.hero {
  position: relative;
  z-index: 2;
  height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 20px;
}

.hero h1 {
  font-size: 3rem;
  font-weight: 800;
  line-height: 1.3;
}

.hero p {
  margin-top: 15px;
  color: #aaa;
  font-size: 1rem;
}

/* 💡 Button Style */
.btn {
  margin-top: 25px;
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(90deg, #4facfe, #8e2de2);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #4facfe;
}

</style>
</head>

<body>

<header>
  <div class="logo">Aethon</div>
</header>

<section class="hero">
  <div>
    <h1>
      Creative Edits.<br>
      Anime VFX.<br>
      One Visual Identity.
    </h1>

    <p>
      I turn ideas into high-impact visuals that stand out.
    </p>

    <button class="btn">View My Work</button>
  </div>
</section>

</body>
</html>

Enter<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aethon Portfolio</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0a192f;
    color: white;
    font-family: Arial;
  }

  header {
    display: flex;
    justify-content: space-between;
    padding: 20px 8%;
  }

  .logo {
    font-size: 24px;
    font-weight: bold;
    color: #00bfff;
    animation: fadeSlide 2s ease forwards;
  }

  @keyframes fadeSlide {
    0% {
      opacity: 0;
      transform: translateX(-20px);
    }
    100% {
      opacity: 1;
      transform: translateX(0);
    }
  }

  /* glow effect خفيف */
  .logo:hover {
    text-shadow: 0 0 10px #00bfff;
  }

</style>
</head>

<body>

<header>
  <div class="logo">Aethon</div>
</header>

</body>
</html>
